<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User</title>
</head>
<body>

<h2>User info</h2>

<table style="border: 1px;">
    <tr>
        <th>ID</th>
        <td th:text="${user.id}"></td>
    </tr>

    <tr>
        <th>Name</th>
        <td th:text="${user.name}"></td>
    </tr>

    <tr>
        <th>Lastname</th>
        <td th:text="${user.lastname}"></td>
    </tr>

    <tr>
        <th>Age</th>
        <td th:text="${user.age}"></td>
    </tr>
</table>

<br>

<a href="/users">Back</a>

</body>
</html>
